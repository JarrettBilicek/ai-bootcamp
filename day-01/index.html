<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hello World</title>
    <style>
        body {
            background-color: #1a1a2e;
            color: #e0e0e0;
            font-family: Arial, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
        }
        .container {
            text-align: center;
            max-width: 600px;
            padding: 2rem;
        }
        h1 {
            color: #ffffff;
            font-size: 2.5rem;
            margin-bottom: 0.5rem;
        }
        .date {
            color: #a0a0b0;
            font-size: 1.1rem;
            margin-bottom: 2rem;
        }
        h2 {
            color: #c0c0d0;
            margin-bottom: 1rem;
        }
        ul {
            list-style: none;
            padding: 0;
        }
        li {
            background-color: #16213e;
            margin: 0.5rem 0;
            padding: 1rem;
            border-radius: 8px;
            font-size: 1.1rem;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>Hello World!</h1>
        <p>My name is <strong>Jarrett Bilicek</strong></p>
        <p class="date">April 4, 2026</p>
        <h2>3 Things I Want to Learn About AI</h2>
        <ul>
            <li>How large language models are trained and fine-tuned</li>
            <li>How to build AI-powered applications with APIs</li>
            <li>The ethical implications and responsible use of AI</li>
        </ul>
    </div>
</body>
</html>
